<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario NoSQL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Panel de Inventario (MongoDB Atlas)</h2>

    <div class="card">
      <h3>Registrar Producto</h3>
      <form id="formProducto">
        <input type="text" id="nombre" placeholder="Nombre del artículo" required>
        <input type="number" id="precio" placeholder="Precio ($)" required>
        <input type="number" id="existencia" placeholder="Cantidad" required>
        <button type="submit">➕ Registrar Producto</button>
      </form>
    </div>

    <div class="card">
      <h3>Existencias en Base de Datos</h3>
      <table>
        <thead>
          <tr>
            <th>Artículo</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla">
          <!-- Ejemplo fijo para que se vean los botones -->
          <tr>
            <td>Ejemplo</td>
            <td>$0</td>
            <td>0 pzas</td>
            <td>
              <button disabled>✏️ Editar</button>
              <button disabled>🗑️ Eliminar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
