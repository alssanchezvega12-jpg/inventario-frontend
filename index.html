<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario NoSQL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Panel de Inventario (MongoDB Atlas)</h2>

    <div class="card">
      <h3>Registrar Producto</h3>
      <form id="formProducto">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" placeholder="Nombre del artículo" required>

        <label for="precio">Precio:</label>
        <input type="number" id="precio" placeholder="Precio ($)" required>

        <label for="existencia">Cantidad:</label>
        <input type="number" id="existencia" placeholder="Cantidad" required>

        <button type="submit" class="btnCrear">➕ Registrar Producto</button>
      </form>
    </div>

    <div class="card">
      <h3>Existencias en Base de Datos</h3>
      <table>
        <thead>
          <tr>
            <th>Artículo</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
